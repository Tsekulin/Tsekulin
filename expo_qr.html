<!DOCTYPE html>
<html>
<head>
  <title>Expo Go QR Code - LAN</title>
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; background: #1a1a1a; color: white; }
    #qr { margin: 20px; background: white; padding: 20px; border-radius: 10px; }
    a { color: #4fc3f7; font-size: 16px; word-break: break-all; max-width: 400px; text-align: center; }
    h1 { color: #4fc3f7; }
    p { color: #888; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Expo Go - PhysCult (LAN)</h1>
  <div id="qr">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=exp://192.168.1.61:8081" alt="QR Code" width="300" height="300">
  </div>
  <a href="exp://192.168.1.61:8081">exp://192.168.1.61:8081</a>
  <p>Scan with Expo Go app on your phone</p>
  <p style="color: #666; font-size: 12px;">Phone and Mac must be on same WiFi network</p>
</body>
</html>
