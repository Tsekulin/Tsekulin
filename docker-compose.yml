services:
  postgres:
    image: postgres:16-alpine
    container_name: physcult-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: physcult
      POSTGRES_PASSWORD: physcult
      POSTGRES_DB: physcult
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  pgdata:
